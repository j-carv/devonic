name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Devonic.slnx

      - name: Build
        run: dotnet build Devonic.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack src/Devonic.CLI/Devonic.CLI.csproj -c Release --no-build -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ matrix.os }}
          path: ./artifacts/*.nupkg
