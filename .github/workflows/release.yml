name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build & Pack
        run: dotnet pack src/Devonic.CLI/Devonic.CLI.csproj -c Release -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

  publish-standalone:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: devonic-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact: devonic-linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact: devonic-osx-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish src/Devonic.CLI/Devonic.CLI.csproj -c Release -r ${{ matrix.rid }} --self-contained -o ./publish

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/* -DestinationPath ${{ matrix.artifact }}

      - name: Archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.artifact }} -C ./publish .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  publish-npm:
    needs: publish-standalone
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
